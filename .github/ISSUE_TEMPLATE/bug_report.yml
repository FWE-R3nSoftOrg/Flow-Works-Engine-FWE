name: Bug Report
description: Report a bug in FWE
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill this out as completely as you can.

  - type: input
    id: version
    attributes:
      label: FWE Version
      placeholder: e.g. v0.1.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - Linux
        - macOS
    validations:
      required: true

  - type: dropdown
    id: gpu
    attributes:
      label: GPU Backend (Simulation)
      options:
        - Auto
        - CUDA (NVIDIA)
        - ROCm (AMD)
        - OpenCL
        - CPU only
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open FWE
        2. Go to ...
        3. Place node ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
    validations:
      required: false
